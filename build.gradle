buildscript {
    ext {
        springBootVersion = '1.5.2.RELEASE'
    }
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")
    }
}

plugins {
    id 'com.gorylenko.gradle-git-properties' version '1.4.17'
}

apply plugin: 'java'
apply plugin: 'idea'
apply plugin: 'eclipse'
apply plugin: 'findbugs'
apply plugin: 'jacoco'
apply plugin: 'org.springframework.boot'

apply from: "$rootDir/gradle/testIntegration.gradle"

group 'net.dorokhov.pony'

repositories {
    mavenCentral()
    maven {
        url "https://dl.bintray.com/ijabz/maven"
    }
}

dependencies {

    runtime 'com.h2database:h2'

    compile 'com.google.guava:guava:21.0'
    compile 'com.google.code.findbugs:annotations:3.0.1'

    compile 'org.springframework.boot:spring-boot-starter-actuator'
    compile 'org.springframework.boot:spring-boot-starter-data-jpa'
    compile 'org.springframework.boot:spring-boot-starter-mobile'
    compile 'org.springframework.boot:spring-boot-starter-security'
    compile 'org.springframework.boot:spring-boot-starter-thymeleaf'
    compile 'org.springframework.boot:spring-boot-starter-web'
    compile 'org.springframework.boot:spring-boot-starter-websocket'
    compile 'org.springframework.boot:spring-boot-starter-cache'

    compile 'com.auth0:java-jwt:3.0.1'
    compile 'org.apache.tika:tika-core:1.14'
    compile 'net.coobird:thumbnailator:0.4.8'
    compile 'com.fasterxml.jackson.module:jackson-module-parameter-names:2.8.8'
    compile 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.8.8'
    compile 'org.flywaydb:flyway-core'
    compile 'org.hibernate:hibernate-ehcache:5.0.12.Final'
    compile 'org.hibernate:hibernate-search-orm:5.6.1.Final'
    compile 'net.jthink:jaudiotagger:2.2.3'

    testCompile 'org.springframework.boot:spring-boot-starter-test'
    testCompile 'org.mockito:mockito-core:2.7.14'
    testCompile 'org.assertj:assertj-core:3.6.2'
    testCompile 'info.solidsoft.mockito:mockito-java8:2.0.1'
}

springBoot {
    buildInfo()
}

findbugs {
    sourceSets = [sourceSets.main]
}

tasks.withType(JavaCompile) {
    options.compilerArgs << "-parameters" << "-Xlint:unchecked" << "-Xlint:deprecation"
}

tasks.withType(FindBugs) {
    reports {
        html.enabled = true
        xml.enabled = false
    }
}

task codeCoverageAggregate(type: JacocoMerge) {
    executionData test, testIntegration
}

task codeCoverageReport(dependsOn: codeCoverageAggregate, type: JacocoReport) {
    group = 'verification'
    description = 'Generates code coverage report for test and testIntegration tasks.'
    executionData codeCoverageAggregate.destinationFile
    sourceDirectories = files(sourceSets.main.allSource.srcDirs)
    classDirectories = files(sourceSets.main.output)
    reports {
        xml.enabled = true
        xml.destination "${buildDir}/reports/jacoco/report.xml"
        html.enabled = true
        html.destination "${buildDir}/reports/jacoco/report"
    }
}

check.dependsOn testIntegration
check.dependsOn codeCoverageReport
