plugins {
    id 'com.moowork.node' version '1.2.0'
}

jar {
    baseName = 'pony2-frontend'
}

node {
    version = '8.9.4'
    yarnVersion = '1.3.2'
    download = true
    workDir = file("${project.buildDir}/nodejs")
    yarnWorkDir = file("${project.buildDir}/yarn")
}

def defineBuildInputs = { TaskInputs inputs ->
    inputs.files(fileTree('.').matching({
        exclude 'build'
    }))
}

def defineBuildOutputs = { TaskOutputs outputs ->
    outputs.dir("$buildDir/angular")
}

task yarnBuild(type: YarnTask, dependsOn: 'yarn') {
    defineBuildInputs(inputs)
    defineBuildOutputs(outputs)
    group = 'build'
    args = ['run', 'build']
}

task yarnBuildDev(type: YarnTask, dependsOn: 'yarn') {
    defineBuildInputs(inputs)
    defineBuildOutputs(outputs)
    group = 'build'
    args = ['run', 'buildDev']
}

task yarnTest(type: YarnTask, dependsOn: 'yarn') {
    defineBuildInputs(inputs)
    defineBuildOutputs(outputs)
    group = 'test'
    args = ['run', 'test']
}

task yarnLint(type: YarnTask, dependsOn: 'yarn') {
    defineBuildInputs(inputs)
    defineBuildOutputs(outputs)
    group = 'check'
    args = ['run', 'lint']
}

task yarnStart(type: YarnTask, dependsOn: 'yarn') {
    group = 'application'
    args = ['run', 'start']
}

jar {
    doFirst {
        copy {
            from "$buildDir/angular"
            into "$buildDir/resources/main/static"
        }
    }
}

if (gradle.startParameter.taskNames.contains('bootRun')) {
    jar.dependsOn yarnBuildDev
} else {
    jar.dependsOn yarnBuild
}

test.dependsOn yarnTest
check.dependsOn yarnLint
