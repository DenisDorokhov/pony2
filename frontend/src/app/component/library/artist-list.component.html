<div class="panel panel-default">
  <div ngbDropdown class="btn-group genre" (openChange)="onDropdownOpenChange($event)">
    <button ngbDropdownToggle type="button" class="genre">
      {{ selectedNavigationItem.title }}
      <span class="caret"></span>
    </button>
    <ul ngbDropdownMenu class="dropdown-menu dropdown-menu-end" role="menu">
      <div class="search-genre">
        <input #filterElement type="text" class="form-control"
               placeholder="{{ 'library.artist.filterGenresPlaceholder' | translate }}">
        <i class="bi bi-filter ms-3 search-icon"></i>
      </div>
      <button ngbDropdownItem
              [class.selected]="selectedNavigationItem.id === navigationItems[0].id" [ngClass]="navigationItems[0].id"
              [title]=navigationItems[0].title (click)="onNavigationItemClick(navigationItems[0])">
        {{ navigationItems[0].menuEntry }}
      </button>
      <button ngbDropdownItem
              [class.selected]="selectedNavigationItem.id === navigationItems[1].id" [ngClass]="navigationItems[1].id"
              [title]=navigationItems[1].title (click)="onNavigationItemClick(navigationItems[1])">
        {{ navigationItems[1].menuEntry }}
      </button>
      <div class="genre-scroller">
        <button *ngFor="let navigationItem of navigationItems.slice(2)" ngbDropdownItem #navigationItemElement
                [class.selected]="selectedNavigationItem.id === navigationItem.id"
                [ngClass]="navigationItem.id"
                [title]=navigationItem.title
                (click)="onNavigationItemClick(navigationItem)">
          {{ navigationItem.menuEntry }}
        </button>
        <div class="notice" *ngIf="genres.length === 0">{{ 'library.artist.noGenresLabel' | translate }}</div>
        <div class="notice" *ngIf="genres.length > 0 && navigationItems.length <= 2">{{ 'library.artist.noFilteredGenresLabel' | translate }}</div>
      </div>
    </ul>
  </div>
  <pony-loading-indicator *ngIf="loadingState === LoadingState.LOADING"></pony-loading-indicator>
  <pony-error-indicator *ngIf="loadingState === LoadingState.ERROR"></pony-error-indicator>
  <pony-no-content-indicator *ngIf="loadingState === LoadingState.EMPTY" [message]="'library.noMusicLabel' | translate">
  </pony-no-content-indicator>
  <pony-no-content-indicator *ngIf="loadingState === LoadingState.LOADED && filteredArtists.length === 0" [message]="'library.artist.noFilteredArtistsLabel' | translate">
  </pony-no-content-indicator>
  <div *ngIf="loadingState === LoadingState.LOADED && filteredArtists.length > 0" #scrollerElement
       class="list-container" data-pony-image-loader-scroller>
    <div class="list-group">
      <pony-artist *ngFor="let artist of filteredArtists; trackBy: trackByArtist" [artist]="artist"></pony-artist>
    </div>
  </div>
</div>
