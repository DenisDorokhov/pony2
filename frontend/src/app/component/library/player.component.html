<div class="player-container">

  <button type="button" class="btn btn-light backward"
          (click)="switchToPreviousSong()" [disabled]="!hasPreviousSong">
    <i class="bi bi-skip-backward-fill"></i>
  </button>
  <button type="button" class="btn btn-light btn-lg play"
          (click)="playOrPause()">
    <i [class]="isPlaying ? 'bi bi-pause-fill' : 'bi bi-play-fill'"></i>
  </button>
  <button type="button" class="btn btn-light forward"
          (click)="switchToNextSong()" [disabled]="!hasNextSong">
    <i class="bi bi-skip-forward-fill"></i>
  </button>

  <div class="title-container">
    <a class="title" href="javascript:void(0);" [title]="songTitle" (click)="selectCurrentSong()">{{ songTitle }}</a>
    @if (this.song) {
      <div ngbDropdown class="options">
        <button ngbDropdownToggle class="menu"><i class="bi bi-three-dots-vertical"></i></button>
        <div ngbDropdownMenu class="dropdown-menu" role="menu">
          <button ngbDropdownItem (click)="playNext()"><i
            class="bi bi-play-circle-fill"></i>{{ 'library.song.playNext' | translate }}
          </button>
          <button ngbDropdownItem (click)="addToQueue()"><i
            class="bi bi-plus-circle-fill"></i>{{ 'library.song.addToQueue' | translate }}
          </button>
          <button ngbDropdownItem (click)="createQueue()"><i
            class="bi bi-plus-lg"></i>{{ 'library.song.createQueue' | translate }}
          </button>
          <button ngbDropdownItem (click)="download()"><i
            class="bi bi-download"></i>{{ 'library.song.download' | translate }}
          </button>
          <li [hidden]="topPlaylists.length < 1">
            <hr class="dropdown-divider">
          </li>
          @for (playlist of topPlaylists; track playlist.id) {
            <button ngbDropdownItem (click)="addToPlaylist(playlist)"><i class="bi bi-file-plus"></i>{{
                'library.song.addToPlaylist' | translate:{
                  name: playlist.name,
                }
              }}
            </button>
          }
          <li>
            <hr class="dropdown-divider">
          </li>
          <button ngbDropdownItem (click)="selectOrCreatePlaylist()"><i
            class="bi bi-music-note-list"></i>{{ 'library.song.selectOrCreatePlaylist' | translate }}
          </button>
        </div>
      </div>
    }
  </div>

  <div class="progress-container" (mousemove)="onProgressMouseMove($event)" (mouseleave)="onProgressMouseLeave()"
       (click)="seek($event)">
    <div class="progress">
      <div class="progress-bar progress-bar-info" [style.width]="(progress * 100) + '%'"></div>
    </div>
    <div class="mouse-progress" [hidden]="!mouseProgress"
         [style.left]="((mouseProgress || 0) * 100) + '%'">{{ formattedMousePosition }}
    </div>
    <div class="mouse-position" [hidden]="!mouseProgress" [class.played]="(mouseProgress || 0) < progress"
         [style.left]="((mouseProgress || 0) * 100) + '%'"></div>
  </div>

  <div class="time">{{ formattedProgress }}</div>
  <div class="loading-indicator-container">
    <span [hidden]="!isLoading" class="spinner-border text-body-secondary loading-indicator" role="status" aria-label="loading"></span>
    <img [hidden]="!isError" class="error-indicator" alt="error"

  <div class="like-container" [hidden]="queue.length < 1 || isLoading || isError">
    <button
      [title]="isLikedSong ? ('player.likedSongButtonTooltip' | translate) : ('player.notLikedSongButtonTooltip' | translate)"
      (click)="onLikeClick()">
      <i class="bi" [class.bi-star-fill]="isLikedSong" [class.bi-star]="!isLikedSong"></i>
    </button>
  </div>
  <div class="duration">{{ formattedDuration }}</div>

  <pony-image-loader [class.pointer]="artworkUrl" [url]="artworkUrl" (click)="openArtwork()"></pony-image-loader>

</div>
