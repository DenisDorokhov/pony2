<div class="panel panel-default">
  <pony-loading-indicator *ngIf="loadingState === LoadingState.LOADING"></pony-loading-indicator>
  <pony-error-indicator *ngIf="loadingState === LoadingState.ERROR"></pony-error-indicator>
  <pony-no-content-indicator *ngIf="loadingState === LoadingState.EMPTY"
                             [message]="'library.noMusicLabel' | translate">
  </pony-no-content-indicator>
  <div *ngIf="loadingState === LoadingState.LOADED"
       class="list-container" data-image-loader-scroller>
    <div class="list-group">
      <a #artistElements *ngFor="let artist of artists"
         [class.active]="artist.id === selectedArtist" (click)="selectArtist(artist)"
         class="list-group-item" title="{{ artist.name }}">
        <pony-image-loader [url]="artist.smallArtworkUrl"></pony-image-loader>
        <div class="artist-name">
          {{ artist.name ? artist.name : ('library.artist.unknownLabel' | translate) }}
        </div>
      </a>
    </div>
  </div>
</div>
